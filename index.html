<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>List 💌</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    overflow:hidden;
    color:white;
}

/* ===== TŁO ===== */
#bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    transition: background-image 1s ease-in-out;
    filter: blur(2px) brightness(0.6);
    transform: scale(1.05);
}

/* ===== PRZYCISK ===== */
#toggleText{
    position:fixed;
    top:15px;
    right:15px;
    z-index:10;
    padding:10px 14px;
    border:none;
    border-radius:10px;
    background:#ff4da6;
    color:white;
    cursor:pointer;
}

/* ===== TEKST ===== */
#textBox{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:85%;
    max-width:600px;
    padding:20px;
    border-radius:20px;
    background:rgba(0,0,0,0.45);
    backdrop-filter: blur(10px);
    text-align:center;
    line-height:1.6;
}

/* ukrywanie */
.hidden{
    display:none;
}
</style>
</head>

<body>

<!-- TŁO -->
<div id="bg"></div>

<!-- PRZYCISK -->
<button id="toggleText" onclick="toggleText()">Ukryj tekst ✖</button>

<!-- TEKST -->
<div id="textBox">
    <h2>💙 Dla najlepszego Taty</h2>
    <p>
        Wszystkiego najlepszego Tato! 💙<br><br>

        Dziękuję Ci za wszystko co dla mnie robisz, za wsparcie, cierpliwość i każdy wspólny dzień.<br><br>

        Jestem Ci bardzo wdzięczna i kocham Cię 💗
    </p>
</div>

<script>

let images = [
    "1.jpg","2.jpg","3.jpg","4.jpg",
    "5.jpg","6.jpg","7.jpg","8.jpg"
];

let index = 0;
let bg = document.getElementById("bg");

/* ustaw tło */
function setBg(){
    bg.style.backgroundImage = `url(${images[index]})`;
}

setBg();

/* slideshow */
setInterval(()=>{
    index = (index + 1) % images.length;
    setBg();
}, 3000);

/* toggle tekst */
let textVisible = true;

function toggleText(){
    let box = document.getElementById("textBox");
    let btn = document.getElementById("toggleText");

    textVisible = !textVisible;

    if(textVisible){
        box.classList.remove("hidden");
        btn.innerText = "Ukryj tekst ✖";
    } else {
        box.classList.add("hidden");
        btn.innerText = "Pokaż tekst 💬";
    }
}

</script>

</body>
</html>
